spring.application.name=exchange-client-service
server.port=8087

spring.datasource.url=jdbc:postgresql://localhost:5433/brokerplatformdb
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Mentor team's stock exchange
exchange.ws-url=${EXCHANGE_WS_URL:ws://localhost:9000/ws}
exchange.api-key=${EXCHANGE_API_KEY}
exchange.api-secret=${EXCHANGE_API_SECRET}
exchange.reconnect-delay-seconds=5

# Internal services
services.account.url=${SERVICES_ACCOUNT_URL:http://localhost:8083}
services.transaction.url=${SERVICES_TRANSACTION_URL:http://localhost:8084}
services.holdings.url=${SERVICES_HOLDINGS_URL:http://localhost:8085}
services.notification.url=${SERVICES_NOTIFICATION_URL:http://localhost:8088}

internal.token=${INTERNAL_TOKEN}
