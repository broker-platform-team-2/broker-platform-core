spring.application.name=exchange-client-service
server.port=8187

spring.datasource.url=jdbc:postgresql://localhost:5433/brokerplatformdb
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Mentor team's stock exchange
exchange.ws-url=${EXCHANGE_WS_URL:ws://localhost:9000/ws}
exchange.base-url=${EXCHANGE_BASE_URL:http://localhost:9000/api/v1}
exchange.api-key=${EXCHANGE_API_KEY}
exchange.api-secret=${EXCHANGE_API_SECRET}
exchange.reconnect-delay-seconds=5

# Comma-separated fallback ticker list for PRICE_FEED if /market/stocks discovery fails.
# Leave empty to rely solely on dynamic discovery.
exchange.price-feed.tickers=${EXCHANGE_PRICE_FEED_TICKERS:}

# Internal services
services.account.url=${SERVICES_ACCOUNT_URL:http://localhost:8183}
services.transaction.url=${SERVICES_TRANSACTION_URL:http://localhost:8184}
services.holdings.url=${SERVICES_HOLDINGS_URL:http://localhost:8185}
services.notification.url=${SERVICES_NOTIFICATION_URL:http://localhost:8188}

internal.token=${INTERNAL_TOKEN}
