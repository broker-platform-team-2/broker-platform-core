spring.application.name=trade-service
server.port=8186

spring.datasource.url=jdbc:postgresql://localhost:5439/brokerplatformdb
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Internal service URLs (called directly, not through gateway)
services.account.url=${SERVICES_ACCOUNT_URL:http://localhost:8183}
services.transaction.url=${SERVICES_TRANSACTION_URL:http://localhost:8184}
services.holdings.url=${SERVICES_HOLDINGS_URL:http://localhost:8185}

# Mentor team's stock exchange API
exchange.base-url=${EXCHANGE_BASE_URL:http://localhost:9000/api/v1}
exchange.api-key=${EXCHANGE_API_KEY}
exchange.api-secret=${EXCHANGE_API_SECRET}

# Kafka (used for order submission — avoids exchange REST API body-forwarding bug)
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

internal.token=${INTERNAL_TOKEN}
