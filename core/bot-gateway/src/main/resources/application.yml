spring:
  application:
    name: bot-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/users/**,/bots/**
        - id: account-service
          uri: ${ACCOUNT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/accounts/**,/funds/**
        - id: transaction-service
          uri: ${TRANSACTION_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/transactions/**,/orders/**
        - id: holdings-service
          uri: ${HOLDINGS_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/holdings/**,/portfolio/**

server:
  port: 8090

jwt:
  secret: ${JWT_SECRET}
