spring:
  application:
    name: user-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8082
          predicates:
            - Path=/users/**
        - id: account-service
          uri: http://localhost:8083
          predicates:
            - Path=/accounts/**,/funds/**
        - id: transaction-service
          uri: http://localhost:8084
          predicates:
            - Path=/transactions/**,/orders/**
        - id: holdings-service
          uri: http://localhost:8085
          predicates:
            - Path=/holdings/**,/portfolio/**

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}
