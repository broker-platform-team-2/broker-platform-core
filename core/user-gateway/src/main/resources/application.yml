spring:
  application:
    name: user-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8182}
          predicates:
            - Path=/users/**
        - id: account-service
          uri: ${ACCOUNT_SERVICE_URL:http://localhost:8183}
          predicates:
            - Path=/accounts/**,/funds/**
        - id: transaction-service
          uri: ${TRANSACTION_SERVICE_URL:http://localhost:8184}
          predicates:
            - Path=/transactions/**,/orders/**
        - id: holdings-service
          uri: ${HOLDINGS_SERVICE_URL:http://localhost:8185}
          predicates:
            - Path=/holdings/**,/portfolio/**
        - id: notification-ws
          uri: ws://notification-service:8188
          predicates:
            - Path=/notifications/ws
        - id: exchange-proxy
          uri: ${EXCHANGE_URL:http://localhost:8085}
          predicates:
            - Path=/exchange/**
          filters:
            - RewritePath=/exchange/(?<rest>.*), /api/v1/${rest}
            - AddRequestHeader=API-KEY, ${EXCHANGE_API_KEY}
            - AddRequestHeader=API-SECRET, ${EXCHANGE_API_SECRET}

server:
  port: 8180

jwt:
  secret: ${JWT_SECRET}
