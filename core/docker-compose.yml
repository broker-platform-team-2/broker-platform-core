networks:
  internal:
    driver: bridge
  public:
    driver: bridge

services:
  db:
    image: postgres:16
    container_name: broker_platform_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-brokerplatformdb}
    ports:
      - "5439:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME:-brokerplatformdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user_service
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME:-brokerplatformdb}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SERVICES_ACCOUNT_URL: http://account-service:8183
    depends_on:
      db:
        condition: service_healthy
      account-service:
        condition: service_started
    networks: [internal]

  account-service:
    build:
      context: .
      dockerfile: account-service/Dockerfile
    container_name: account_service
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME:-brokerplatformdb}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
    depends_on:
      db:
        condition: service_healthy
    networks: [internal]

  transaction-service:
    build:
      context: .
      dockerfile: transaction-service/Dockerfile
    container_name: transaction_service
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME:-brokerplatformdb}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
    depends_on:
      db:
        condition: service_healthy
    networks: [internal]

  holdings-service:
    build:
      context: .
      dockerfile: holdings-service/Dockerfile
    container_name: holdings_service
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME:-brokerplatformdb}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
    depends_on:
      db:
        condition: service_healthy
    networks: [internal]

  trade-service:
    build:
      context: .
      dockerfile: trade-service/Dockerfile
    container_name: trade_service
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME:-brokerplatformdb}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      SERVICES_ACCOUNT_URL: http://account-service:8183
      SERVICES_TRANSACTION_URL: http://transaction-service:8184
      SERVICES_HOLDINGS_URL: http://holdings-service:8185
      SERVICES_EXCHANGE_CLIENT_URL: http://exchange-client-service:8187
      EXCHANGE_BASE_URL: ${EXCHANGE_BASE_URL}
      EXCHANGE_API_KEY: ${EXCHANGE_API_KEY}
      EXCHANGE_API_SECRET: ${EXCHANGE_API_SECRET}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
    depends_on:
      db:
        condition: service_healthy
      account-service:
        condition: service_started
      transaction-service:
        condition: service_started
      holdings-service:
        condition: service_started
      exchange-client-service:
        condition: service_started
    networks: [internal]

  exchange-client-service:
    build:
      context: .
      dockerfile: exchange-client-service/Dockerfile
    container_name: exchange_client_service
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME:-brokerplatformdb}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      SERVICES_ACCOUNT_URL: http://account-service:8183
      SERVICES_TRANSACTION_URL: http://transaction-service:8184
      SERVICES_HOLDINGS_URL: http://holdings-service:8185
      SERVICES_NOTIFICATION_URL: http://notification-service:8188
      EXCHANGE_WS_URL: ${EXCHANGE_WS_URL}
      EXCHANGE_BASE_URL: ${EXCHANGE_BASE_URL}
      EXCHANGE_PRICE_FEED_TICKERS: ${EXCHANGE_PRICE_FEED_TICKERS:-}
      EXCHANGE_API_KEY: ${EXCHANGE_API_KEY}
      EXCHANGE_API_SECRET: ${EXCHANGE_API_SECRET}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
    depends_on:
      db:
        condition: service_healthy
      account-service:
        condition: service_started
      transaction-service:
        condition: service_started
      holdings-service:
        condition: service_started
      notification-service:
        condition: service_started
    networks: [internal]

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: notification_service
    restart: unless-stopped
    ports:
      - "8188:8188"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME:-brokerplatformdb}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_TOKEN: ${INTERNAL_TOKEN}
    depends_on:
      db:
        condition: service_healthy
    networks: [internal]

  user-gateway:
    build:
      context: .
      dockerfile: user-gateway/Dockerfile
    container_name: user_gateway
    restart: unless-stopped
    ports:
      - "8180:8180"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      USER_SERVICE_URL: http://user-service:8182
      ACCOUNT_SERVICE_URL: http://account-service:8183
      TRANSACTION_SERVICE_URL: http://transaction-service:8184
      HOLDINGS_SERVICE_URL: http://holdings-service:8185
      TRADE_SERVICE_URL: http://trade-service:8186
      NOTIFICATION_SERVICE_HOST: notification-service
      EXCHANGE_URL: ${EXCHANGE_URL}
      EXCHANGE_API_KEY: ${EXCHANGE_API_KEY}
      EXCHANGE_API_SECRET: ${EXCHANGE_API_SECRET}
    depends_on:
      - user-service
      - account-service
      - transaction-service
      - holdings-service
      - trade-service
      - notification-service
    networks: [internal, public]

  bot-gateway:
    build:
      context: .
      dockerfile: bot-gateway/Dockerfile
    container_name: bot_gateway
    restart: unless-stopped
    ports:
      - "8190:8190"
    environment:
      JWT_SECRET: ${JWT_SECRET}
      USER_SERVICE_URL: http://user-service:8182
      ACCOUNT_SERVICE_URL: http://account-service:8183
      TRANSACTION_SERVICE_URL: http://transaction-service:8184
      HOLDINGS_SERVICE_URL: http://holdings-service:8185
      TRADE_SERVICE_URL: http://trade-service:8186
      NOTIFICATION_SERVICE_HOST: notification-service
      EXCHANGE_URL: ${EXCHANGE_URL}
      EXCHANGE_API_KEY: ${EXCHANGE_API_KEY}
      EXCHANGE_API_SECRET: ${EXCHANGE_API_SECRET}
    depends_on:
      - user-service
      - account-service
      - transaction-service
      - holdings-service
      - trade-service
      - notification-service
    networks: [internal, public]

  trading-bot:
    build:
      context: ../../broker-platform-bot-gateway-spec
      dockerfile: Dockerfile
    container_name: trading_bot
    restart: unless-stopped
    environment:
      GATEWAY_HTTP_URL: http://bot-gateway:8190
      GATEWAY_WS_URL: ws://bot-gateway:8190/notifications/ws
      BOT_EMAIL: ${BOT_EMAIL}
      BOT_PASSWORD: ${BOT_PASSWORD}
      BOT_USERNAME: ${BOT_USERNAME:-team2-bot}
      SEED_DEPOSIT: ${SEED_DEPOSIT:-100000}
      SEED_CURRENCY: ${SEED_CURRENCY:-USD}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      - bot-gateway
    networks: [internal]

volumes:
  pgdata:
